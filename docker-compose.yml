services:
  # Backend API (using MongoDB Atlas cloud database)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desi-plaza-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb+srv://desiplaza_admin:AkH2jAWi5iY0zvCb@cluster0.d4gnea3.mongodb.net/desiplaza?retryWrites=true&w=majority}
      JWT_SECRET: ${JWT_SECRET:-desi_plaza_secret_key_2024_secure}
      JWT_LIFETIME: ${JWT_LIFETIME:-30d}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    depends_on: []
    networks:
      - desi-plaza-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Web App (deploy separately)
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   container_name: desi-plaza-frontend
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
  #   depends_on:
  #     - backend
  #   networks:
  #     - desi-plaza-network
  #   volumes:
  #     - ./ssl:/etc/nginx/ssl:ro
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

networks:
  desi-plaza-network:
    driver: bridge

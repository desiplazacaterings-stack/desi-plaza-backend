version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: https://github.com/desiplazacaterings-stack/desi-plaza-backend.git
      dockerfile: Dockerfile
    container_name: desi-plaza-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-30d}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    networks:
      - desi-plaza-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Web App
  frontend:
    build:
      context: https://github.com/desiplazacaterings-stack/desi-plaza-frontend.git
      dockerfile: Dockerfile
    container_name: desi-plaza-frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      VITE_API_BASE_URL: https://api.desiplazacaterings.com
    networks:
      - desi-plaza-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  desi-plaza-network:
    driver: bridge
